name: Deploy to GitHub Pages

# Builds the app and publishes it to GitHub Pages on every push to main.
# IMPORTANT: no VITE_ODDS_API_KEY is provided to this build, so the public site runs in
# demo/sample mode — the live API key is never baked into the public artifact. The real live
# app runs locally with the key in .env (which is gitignored).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
